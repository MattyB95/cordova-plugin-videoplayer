buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.1.0'
    }
}

apply plugin: 'com.android.library'

android {
    namespace = 'com.moust.cordova.videoplayer.test'
    compileSdk = 33

    defaultConfig {
        minSdk = 19
        targetSdk = 33
    }

    sourceSets {
        main {
            java.srcDirs = ['../../src/android']
            manifest.srcFile 'src/main/AndroidManifest.xml'
        }
    }

    testOptions {
        unitTests {
            includeAndroidResources = true
            returnDefaultValues = true
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // Cordova needed to compile VideoPlayer.java; VideoPlayer extends CordovaPlugin so
    // the jar must also be on the test runtime classpath for class loading to succeed.
    compileOnly 'org.apache.cordova:framework:10.1.1'
    compileOnly 'androidx.appcompat:appcompat:1.6.1'
    testImplementation 'org.apache.cordova:framework:10.1.1'
    testImplementation 'androidx.appcompat:appcompat:1.6.1'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
}
